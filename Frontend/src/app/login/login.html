<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>NeoBank Ai | Authentication</title>
  <!-- TailwindCSS v3 for utility-first styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* modern micro-interactions & smoothness */
    .card-transition {
      transition: transform 0.25s ease, box-shadow 0.3s ease;
    }
    .card-transition:hover {
      transform: translateY(-3px);
      box-shadow: 0 25px 35px -12px rgba(79, 70, 229, 0.12), 0 8px 12px -6px rgba(0, 0, 0, 0.02);
    }
    .input-focus-effect {
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    .btn-modern {
      transition: all 0.2s ease;
      transform: scale(1);
    }
    .btn-modern:active {
      transform: scale(0.97);
    }
    /* smooth ring for focus — unified indigo */
    .focus-ring-custom:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-white to-indigo-50/40 font-sans antialiased">

  <div class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="max-w-md w-full">
      
      <!-- modern card: clean, unified with NeoBank Ai identity (indigo/blue tones) -->
      <div class="bg-white/90 backdrop-blur-[1px] rounded-2xl shadow-2xl shadow-indigo-100/60 card-transition overflow-hidden border border-indigo-100/40">
        
        <!-- header: brand-centric & minimal separation -->
        <div class="px-6 pt-6 pb-4 border-b border-indigo-50/80">
          <div class="flex items-center gap-3">
            <div>
              <h2 class="text-xl font-bold tracking-tight bg-gradient-to-r from-indigo-800 to-indigo-600 bg-clip-text text-transparent">NeoBank Ai</h2>
              <p class="text-xs text-indigo-400/80 font-medium mt-0.5">secure access</p>
            </div>
          </div>
        </div>
        
        <!-- login form body: smooth spacing, brand accents -->
        <div class="p-6 pt-5">
          <!-- Angular reactive form — untouched logic, only style refresh -->
          <form [formGroup]="formLogin" (ngSubmit)="handleLogin()" class="space-y-5">
            
            <!-- username field with modern label & focus state -->
            <div class="space-y-1.5">
              <label class="block text-sm font-semibold text-gray-700 tracking-wide">
                Username
              </label>
              <div class="relative">
                <input type="text" 
                       formControlName="username"
                       placeholder="admin"
                       class="w-full px-4 py-2.5 text-sm bg-white border border-gray-200 rounded-xl shadow-sm
                              transition-all duration-200 placeholder:text-gray-400
                              focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200/60 focus:outline-none
                              hover:border-indigo-300 input-focus-effect"
                       autocomplete="username" />
              </div>
            </div>
            
            <!-- password field with 'forgot?' hint in unified indigo -->
            <div class="space-y-1.5">
              <div class="flex items-center justify-between">
                <label class="block text-sm font-semibold text-gray-700 tracking-wide">
                  Password
                </label>
              </div>
              <div class="relative">
                <input type="password" 
                       formControlName="password"
                       placeholder="··········"
                       class="w-full px-4 py-2.5 text-sm bg-white border border-gray-200 rounded-xl shadow-sm
                              transition-all duration-200 placeholder:text-gray-400
                              focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200/60 focus:outline-none
                              hover:border-indigo-300 input-focus-effect"
                       autocomplete="current-password" />
              </div>
            </div>
            
            <!-- unified login CTA — indigo gradient with modern micro-shadow -->
            <button type="submit"
                    class="btn-modern w-full mt-2 bg-gradient-to-r from-indigo-700 to-indigo-500
                           hover:from-indigo-800 hover:to-indigo-600
                           text-white font-semibold py-2.5 px-4 rounded-xl shadow-md
                           shadow-indigo-300/30 transition-all duration-200
                           focus:outline-none focus:ring-2 focus:ring-indigo-400/70 focus:ring-offset-2
                           text-sm tracking-wide flex items-center justify-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
              </svg>
              Access Dashboard
            </button>
            
            <!-- decorative divider with unified tone -->
            <div class="relative pt-1">
              <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-indigo-100"></div>
              </div>
            </div>
          </form>
        </div>
      </div>
      </div>
    </div>

</body>
</html>
