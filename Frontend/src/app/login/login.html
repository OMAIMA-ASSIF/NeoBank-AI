<div class="max-w-sm border border-gray-200 rounded-lg shadow-sm mx-auto">
  <div class="px-4 py-2 border-b border-gray-200 text-base font-semibold text-gray-700">
    Authentication
  </div>
  <div class="p-4">
    <form [formGroup]="formLogin" (ngSubmit)="handleLogin()">
      <div class="mb-3">
        <label class="block text-xs font-medium text-gray-600 mb-1">Username</label>
        <input type="text" class="w-full px-3 py-1.5 text-sm border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500" formControlName="username"/>
      </div>

      <div class="mb-3">
        <label class="block text-xs font-medium text-gray-600 mb-1">Password</label>
        <input type="password" class="w-full px-3 py-1.5 text-sm border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500" formControlName="password"/>
      </div>

      <button type="submit" class="w-full px-4 py-1.5 text-sm bg-green-600 hover:bg-green-700 text-white font-medium rounded-md shadow-sm transition duration-150 ease-in-out">
        Login
      </button>
    </form>
  </div>
</div>
