<div class="container mx-auto p-4">
  <div class="bg-white shadow-md rounded-lg border border-gray-200">

    <div class="px-6 py-4 border-b border-gray-200 font-semibold text-lg">
      Add new Customer
    </div>

    <div class="p-6">
      <form [formGroup]="newCustomerFormGroup" (ngSubmit)="handleSaveCustomer()">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Name
          </label>
          <input type="text" formControlName="name"
                 class="w-full px-3 py-2 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
          <span
          class="text-red-500 text-sm mt-1 block"
          *ngIf="newCustomerFormGroup.controls['name'].touched
          && newCustomerFormGroup.controls['name'].errors
          && newCustomerFormGroup.controls['name'].errors!['required']">
            Name is required
          </span>
        </div>

        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Email
          </label>
          <input type="email" formControlName="email"
                 class="w-full px-3 py-2 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
          <span
          class="text-red-500 text-sm mt-1 block"
          *ngIf="newCustomerFormGroup.controls['email'].touched
          && newCustomerFormGroup.controls['email'].errors
          && newCustomerFormGroup.controls['email'].errors!['required']">
            Email is not valid
          </span>
        </div>
        <button [disabled]="!newCustomerFormGroup.valid"
                type="submit"
                class="px-4 py-2 bg-indigo-50 text-blue-700 hover:bg-indigo-100 font-semibold rounded-2xl border border-indigo-200 transition-all cursor-pointer">
          Save Changes
        </button>
      </form>
    </div>

  </div>
</div>
