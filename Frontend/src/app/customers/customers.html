<div class="container mx-auto mt-2 px-4">
  <ng-container *ngIf="customers | async as listCustomers; else failureOrLoading">
    <div
  class="overflow-hidden rounded-lg border border-gray-200 bg-white shadow-sm">
    <div class="border-b border-gray-200 bg-gray-50 px-4 py-3 font-semibold text-gray-700">
      Customers
    </div>
    <div *ngIf="searchFormGroup">
      <form [formGroup]="searchFormGroup" (ngSubmit)="handleSearchCustomers()"
      class="w-full flex justify-center my-6">
        <div class="relative w-full max-w-md">
          <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </div>
          <input type="text"
                formControlName="keyword"
                placeholder="Search by name"
                class="block w-full pl-12 pr-28 py-3 text-sm text-gray-900 bg-gray-50 border border-gray-300 rounded-3xl shadow-sm
                        focus:ring-1 focus:ring-blue-800 focus:border-blue-800 outline-none transition"/>
          <button type="submit"
                  class="absolute right-2 top-1/2 -translate-y-1/2 px-5 py-2 text-sm font-semibold text-white bg-blue-600 rounded-3xl
                        hover:bg-blue-700 shadow-md transition duration-200 cursor-pointer">
            Search
          </button>

        </div>
      </form>
    </div>

    <div class="p-4">
      <div class="overflow-x-auto shadow-sm border border-gray-200 rounded-lg">
        <table class="min-w-full divide-y divide-gray-200 text-left text-sm">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-6 py-3 font-semibold text-gray-900">ID</th>
              <th class="px-6 py-3 font-semibold text-gray-900">Name</th>
              <th class="px-6 py-3 font-semibold text-gray-900">Email</th>
            </tr>
          </thead>

          <tbody class="divide-y divide-gray-200 bg-white">
            <tr *ngFor="let c of customers | async" class="hover:bg-gray-50 transition-colors">
              <td class="px-6 py-4 whitespace-nowrap text-gray-700">{{c.id}}</td>
              <td class="px-6 py-4 whitespace-nowrap text-gray-900 font-medium">{{c.name}}</td>
              <td class="px-6 py-4 whitespace-nowrap text-gray-600">{{c.email}}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  </ng-container>
  <ng-template #failureOrLoading>
    <ng-container *ngIf="errorMessage; else loading">
      <div class="text-red-500">
        {{errorMessage}}
      </div>
    </ng-container>
  </ng-template>
  <ng-template #loading>
    <div class="text-gray-500">
      Loading customers...
    </div>
   </ng-template>
</div>
