<div class="container mt-2 px-4 w-1/2 justify-start">
  <div class="overflow-hidden rounded-lg border border-gray-200 bg-white shadow-sm">
    <div class="border-b border-gray-200 bg-gray-50 px-4 py-3 font-semibold text-gray-700">
      Accounts
    </div>
    <div>
      <div class="p-4">
        <form [formGroup]="accountFormGroup" (ngSubmit)="handleSearchAccount()">
          <div>
            <div class="relative w-full max-w-md">
              <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
              </div>
              <input type="text"
                    formControlName="accountId"
                    placeholder="Search by account ID"
                    class="block w-full pl-12 pr-28 py-3 text-sm text-gray-900 bg-gray-50 border border-gray-300 rounded-3xl shadow-sm
                            focus:ring-1 focus:ring-blue-800 focus:border-blue-800 outline-none transition"/>
              <button type="submit"
                      class="absolute right-2 top-1/2 -translate-y-1/2 px-5 py-2 text-sm font-semibold text-white bg-blue-600 rounded-3xl
                            hover:bg-blue-700 shadow-md transition duration-200 cursor-pointer">
                Search
              </button>

            </div>
          </div>
        </form>
        <ng-container *ngIf="accountObservable | async as accountDetails">
          <div>
            <label>AccountId : </label>
            <p><strong>{{accountDetails.accountId}}</strong></p>
          </div>
          <div>
            <label>Balance : </label>
            <p><strong>{{accountDetails.balance | number : '1.2-2'}}</strong></p>
          </div>
          <table class="min-w-full divide-y divide-gray-200 border shadow-sm mt-2">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Type</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Amount</th>
              </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
              <tr *ngFor="let op of accountDetails.accountOperationDTOList" class="hover:bg-gray-50 transition-colors">
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{op.id}}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                  {{op.operationDate | date: 'dd-MM-yyyy'}}
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                  <span [ngClass]="op.type === 'DEBIT' ? 'text-red-600' : 'text-green-600'" class="font-semibold">
                    {{op.type}}
                  </span>
                </td>
                <td class="text-right px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{op.amount | number:'1.2-2'}}</td>
              </tr>
            </tbody>
          </table>
          
        </ng-container>
      </div>
    </div>

  </div>
</div>
