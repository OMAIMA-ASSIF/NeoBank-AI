<div class="container mx-auto mt-2 px-4">
  <div class="flex flex-wrap -mx-2">
    <!--Account history-->
    <div class="w-full md:w-1/2 px-2 mb-4">
      <div class="overflow-hidden rounded-lg border border-gray-200 bg-white shadow-sm">
        <div class="border-b border-gray-200 bg-gray-50 px-4 py-3 font-semibold text-gray-700">
          Accounts
        </div>
        <div class="p-4">
          <form [formGroup]="accountFormGroup" (ngSubmit)="handleSearchAccount()">
            <div class="relative w-full max-w-md">
              <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
              </div>
              <input type="text"
                    formControlName="accountId"
                    placeholder="Search by account ID"
                    class="block w-full pl-12 pr-28 py-3 text-sm text-gray-900 bg-gray-50 border border-gray-300 rounded-3xl shadow-sm
                            focus:ring-1 focus:ring-blue-800 focus:border-blue-800 outline-none transition"/>
              <button type="submit"
                      class="absolute right-2 top-1/2 -translate-y-1/2 px-5 py-2 text-sm font-semibold text-white bg-blue-600 rounded-3xl
                            hover:bg-blue-700 shadow-md transition duration-200 cursor-pointer">
                Search
              </button>
            </div>
          </form>

          <!-- errorrrs -->
          <ng-template #errorTemplate>
            <ng-container *ngIf="errorMessage">
              <div class="mt-4 text-red-600 bg-red-50 border border-red-200 rounded-lg p-3">
                {{ errorMessage }}
              </div>
            </ng-container>
          </ng-template>

          <ng-container *ngIf="accountObservable | async as accountDetails; else errorTemplate">
            <div class="mt-4 space-y-2">
              <div class="flex items-center">
                <label class="w-24 text-sm font-medium text-gray-600">Account ID :</label>
                <strong class="text-gray-900">{{ accountDetails.accountId }}</strong>
              </div>
              <div class="flex items-center">
                <label class="w-24 text-sm font-medium text-gray-600">Balance :</label>
                <strong class="text-gray-900">{{ accountDetails.balance | number:'1.2-2' }}</strong>
              </div>
            </div>

            <div class="overflow-x-auto mt-4">
              <table class="min-w-full divide-y divide-gray-200 border shadow-sm rounded-lg">
                <thead class="bg-gray-50">
                  <tr>
                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Type</th>
                    <th class="px-4 py-2 text-right text-xs font-medium text-gray-500 uppercase">Amount(MAD)</th>
                  </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                  <tr *ngFor="let op of accountDetails.accountOperationDTOList" class="hover:bg-gray-50 transition">
                    <td class="px-4 py-2 text-sm text-gray-900">{{ op.id }}</td>
                    <td class="px-4 py-2 text-sm text-gray-500">{{ op.operationDate | date:'dd-MM-yyyy:HH:mm:ss' }}</td>
                    <td class="px-4 py-2 text-sm">
                      <span [ngClass]="op.type === 'DEBIT' ? 'text-red-600' : 'text-green-600'" class="font-semibold">
                        {{ op.type }}
                      </span>
                    </td>
                    <td class="px-4 py-2 text-sm text-right font-medium text-gray-900">{{ op.amount | number:'1.2-2' }}</td>
                  </tr>
                </tbody>
              </table>
            </div>

            <!-- Pages -->
            <ul class="flex space-x-1 w-fit mt-4 mx-auto">
              <li *ngFor="let item of [].constructor(accountDetails.totalPages); let page = index">
                <a (click)="gotoPage(page)"
                   [ngClass]="page === currentPage
                        ? 'bg-blue-600 text-white border-blue-600 shadow-md'
                        : 'bg-white text-blue-600 border-blue-600 hover:bg-blue-50'"
                   class="px-3 py-1 text-sm font-medium border rounded-full cursor-pointer transition duration-200">
                  {{ page + 1 }}
                </a>
              </li>
            </ul>
          </ng-container>
        </div>
      </div>
    </div>

    <!-- operations -->
    <div class="w-full md:w-1/2 px-2 mb-4">
      <div class="overflow-hidden rounded-lg border border-gray-200 bg-white shadow-sm" *ngIf="accountObservable">
        <div class="border-b border-gray-200 bg-gray-50 px-4 py-3 font-semibold text-gray-700">
          Operations
        </div>
        <div *ngIf="authService.roles.includes('ADMIN')" class="p-4">
          <form [formGroup]="operationFormGroup" (ngSubmit)="handleAccountOperation()">
            <div class="flex space-x-4 mb-4">
              <label class="inline-flex items-center">
                <input type="radio" formControlName="operationType" value="DEBIT" class="form-radio text-blue-600">
                <span class="ml-2 text-gray-700">DEBIT</span>
              </label>
              <label class="inline-flex items-center">
                <input type="radio" formControlName="operationType" value="CREDIT" class="form-radio text-blue-600">
                <span class="ml-2 text-gray-700">CREDIT</span>
              </label>
              <label class="inline-flex items-center">
                <input type="radio" formControlName="operationType" value="TRANSFER" class="form-radio text-blue-600">
                <span class="ml-2 text-gray-700">TRANSFER</span>
              </label>
            </div>

            <div class="mb-4" *ngIf="operationFormGroup.value.operationType === 'TRANSFER'">
              <label class="block text-sm font-medium text-gray-700 mb-1">Account Destination :</label>
              <input type="text" formControlName="accountDestination"
                     class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div class="mb-4">
              <label class="block text-sm font-medium text-gray-700 mb-1">Amount (MAD):</label>
              <input type="number" formControlName="amount"
                     class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div class="mb-4">
              <label class="block text-sm font-medium text-gray-700 mb-1">Description :</label>
              <input type="text" formControlName="description"
                     class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>

            <button type="submit"
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-md shadow-md transition duration-200">
              Save Operation
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
